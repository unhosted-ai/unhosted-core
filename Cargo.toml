[workspace]
resolver = "2"
members = ["crates/unhosted-core", "crates/unhosted-cli", "crates/unhosted-desktop"]

[workspace.package]
version = "0.0.3"
edition = "2021"
license = "AGPL-3.0-or-later"
repository = "https://github.com/unhosted-ai/unhosted"
authors = ["Unhosted contributors"]
rust-version = "1.75"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
axum = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
bytes = "1"
rust-embed = { version = "8", features = ["axum", "interpolate-folder-path"] }
mime_guess = "2"
tao = "0.31"
wry = "0.48"
mdns-sd = "0.13"
hostname = "0.4"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
