name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            kind: macos
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            kind: linux
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            kind: windows
          # x86_64-apple-darwin (Intel Mac) is dropped from the matrix:
          # macos-13 runner pool queues hours behind the others, blocking
          # the release. Apple Silicon Macs run x86_64 binaries fine via
          # Rosetta, and Intel users on bare hardware can build from source.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ----- platform setup for the Tauri 2 bundler -----
      # Linux: Tauri 2 uses the same WebKitGTK pair as the old tao+wry shell,
      # plus the rsvg loader for icon rasterization in the bundler.
      - name: Install Linux GUI + bundler deps
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      # macOS: nothing extra needed — Tauri's bundler uses hdiutil + sips
      # which ship with the OS.

      # Windows: WiX 3 is what `tauri bundle` invokes for .msi. NSIS is
      # what it invokes for the .exe installer. Both come pre-installed
      # on windows-latest runners.

      # ----- install the Tauri CLI -----
      # We use the Rust binary (faster cold start than the npm package,
      # no Node dep). Pinned to a minor for reproducibility.
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.4" --locked

      # ----- build the CLI (separate crate from the desktop shell) -----
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p unhosted-cli

      # ----- bundle the desktop shell via Tauri -----
      # Produces .app + .dmg on macOS, .deb + .AppImage + .rpm on Linux,
      # .msi + .exe (NSIS) on Windows — plus the updater manifest
      # (`latest.json`) when TAURI_SIGNING_PRIVATE_KEY is set.
      - name: Build desktop bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: crates/unhosted-desktop
        run: cargo tauri build --target ${{ matrix.target }}

      # ----- stage release artifacts -----
      - name: Stage release artifacts (linux)
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          STAGE="unhosted-${{ matrix.target }}"
          mkdir -p dist-stage
          # CLI tarball — same as before
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/unhosted "$STAGE/"
          cp scripts/unhosted.desktop  "$STAGE/" 2>/dev/null || true
          cp scripts/unhosted.service  "$STAGE/" 2>/dev/null || true
          cp LICENSE README.md CHANGELOG.md "$STAGE/"
          tar -czf "dist-stage/${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "dist-stage/${STAGE}.tar.gz" > "dist-stage/${STAGE}.tar.gz.sha256"
          # Tauri bundles
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          find "$BUNDLE_DIR" -maxdepth 3 \( -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.sig" \) -exec cp {} dist-stage/ \;
          ls -lah dist-stage

      - name: Stage release artifacts (macos)
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          STAGE="unhosted-${{ matrix.target }}"
          mkdir -p dist-stage
          # CLI tarball
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/unhosted "$STAGE/"
          cp LICENSE README.md CHANGELOG.md "$STAGE/"
          tar -czf "dist-stage/${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "dist-stage/${STAGE}.tar.gz" > "dist-stage/${STAGE}.tar.gz.sha256"
          # Tauri bundles — copy .app archive + .dmg + sig
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_DIR/dmg" ]; then
            cp "$BUNDLE_DIR/dmg/"*.dmg dist-stage/ 2>/dev/null || true
          fi
          if [ -d "$BUNDLE_DIR/macos" ]; then
            # Tauri's updater plugin requires the .app.tar.gz that *Tauri
            # itself* produced, because the matching .sig file is signed
            # against those exact bytes. If we re-tar the .app from
            # scratch the bytes drift (timestamps, file order) and the
            # signature fails to verify — that's why v0.0.15's manifest
            # had no darwin-aarch64 entry. So: copy Tauri's tarball
            # straight through, and rename its companion .sig to match
            # the asset name install.sh expects.
            SRC_TGZ=$(find "$BUNDLE_DIR/macos" -maxdepth 1 -name "*.app.tar.gz" | head -1)
            DEST_NAME="unhosted-macos-app-${{ matrix.target }}.tar.gz"
            if [ -n "$SRC_TGZ" ]; then
              cp "$SRC_TGZ" "dist-stage/${DEST_NAME}"
              if [ -f "${SRC_TGZ}.sig" ]; then
                cp "${SRC_TGZ}.sig" "dist-stage/${DEST_NAME}.sig"
              fi
            else
              # Fallback: Tauri didn't produce a .app.tar.gz (e.g. older
              # tauri-cli, or createUpdaterArtifacts is off). Re-tar so
              # install.sh still gets *something*, but the manifest builder
              # won't find a matching .sig and will skip darwin-aarch64.
              APP=$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)
              if [ -n "$APP" ]; then
                tar -czf "dist-stage/${DEST_NAME}" -C "$(dirname "$APP")" "$(basename "$APP")"
              fi
            fi
          fi
          # Any remaining .sig files (e.g. dmg.sig) — copy without renaming.
          find "$BUNDLE_DIR" -maxdepth 3 -name "*.sig" -not -name "*.app.tar.gz.sig" \
            -exec cp {} dist-stage/ \; 2>/dev/null || true
          for f in dist-stage/*.dmg dist-stage/*.tar.gz; do
            [ -f "$f" ] && shasum -a 256 "$f" > "$f.sha256"
          done
          ls -lah dist-stage

      - name: Stage release artifacts (windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          $stage = "unhosted-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist-stage | Out-Null
          # CLI zip
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/unhosted.exe" "$stage/"
          Copy-Item LICENSE,README.md,CHANGELOG.md "$stage/"
          Compress-Archive -Path $stage -DestinationPath "dist-stage/$stage.zip" -Force
          (Get-FileHash -Algorithm SHA256 "dist-stage/$stage.zip").Hash + "  $stage.zip" | Set-Content "dist-stage/$stage.zip.sha256"
          # Tauri bundles
          $bundleDir = "target/${{ matrix.target }}/release/bundle"
          if (Test-Path "$bundleDir/msi") {
            Get-ChildItem "$bundleDir/msi/*.msi","$bundleDir/msi/*.sig" -ErrorAction SilentlyContinue | Copy-Item -Destination dist-stage/
          }
          if (Test-Path "$bundleDir/nsis") {
            Get-ChildItem "$bundleDir/nsis/*.exe","$bundleDir/nsis/*.sig" -ErrorAction SilentlyContinue | Copy-Item -Destination dist-stage/
          }
          Get-ChildItem dist-stage

      - uses: actions/upload-artifact@v4
        with:
          name: unhosted-${{ matrix.target }}
          path: dist-stage/*
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      # Generate the updater manifest (`latest.json`) so installed
      # desktop shells can self-update. Each platform's bundle has a
      # `.sig` next to it from the Tauri signer; the script reads them
      # back and assembles the JSON the updater plugin expects.
      # No-ops cleanly when no `.sig` files are present (which is
      # what happens until the TAURI_SIGNING_PRIVATE_KEY secret is set).
      - name: Generate updater manifest
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/build-updater-manifest.py "$TAG" dist "$REPO" || true
          ls -lah dist
          cat dist/latest.json 2>/dev/null || echo "(no latest.json — updater secrets likely not set yet)"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See CHANGELOG.md for what's in this release." \
            --draft=false \
            dist/*
