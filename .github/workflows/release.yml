name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          # x86_64-apple-darwin (Intel Mac) is dropped from the matrix:
          # macos-13 runner pool queues hours behind the others, blocking
          # the release. Apple Silicon Macs run x86_64 binaries fine via
          # Rosetta, and Intel users on bare hardware can build from source.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p unhosted-cli

      - name: Stage release artifact (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          STAGE="unhosted-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/unhosted "$STAGE/"
          cp LICENSE README.md CHANGELOG.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Stage release artifact (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "unhosted-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/unhosted.exe" "$stage/"
          Copy-Item LICENSE,README.md,CHANGELOG.md "$stage/"
          Compress-Archive -Path $stage -DestinationPath "$stage.zip" -Force
          (Get-FileHash -Algorithm SHA256 "$stage.zip").Hash + "  $stage.zip" | Set-Content "$stage.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: unhosted-${{ matrix.target }}
          path: |
            unhosted-${{ matrix.target }}.${{ matrix.archive }}
            unhosted-${{ matrix.target }}.${{ matrix.archive }}.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See CHANGELOG.md for what's in this release." \
            --draft=false \
            dist/*
