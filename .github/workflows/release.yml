name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            kind: macos
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            kind: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
            kind: linux
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            kind: windows
          # x86_64-apple-darwin (Intel Mac) is dropped from the matrix:
          # macos-13 runner pool queues hours behind the others, blocking
          # the release. Apple Silicon Macs run x86_64 binaries fine via
          # Rosetta, and Intel users on bare hardware can build from source.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ----- platform setup for the desktop shell -----
      # Linux: tao + wry need gtk/webkit2gtk + libsoup at build time. Users
      # also need the matching runtime packages — the installer prints a hint.
      - name: Install Linux GUI deps
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      # macOS: librsvg gives us rsvg-convert for the .icns icon pipeline.
      - name: Install macOS bundler deps
        if: matrix.kind == 'macos'
        run: brew install librsvg

      # ----- build both binaries -----
      - name: Build CLI + desktop shell
        run: |
          cargo build --release --target ${{ matrix.target }} -p unhosted-cli
          cargo build --release --target ${{ matrix.target }} -p unhosted-desktop

      # ----- stage release artifacts -----
      - name: Stage release artifact (linux)
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          STAGE="unhosted-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/unhosted          "$STAGE/"
          cp target/${{ matrix.target }}/release/unhosted-desktop  "$STAGE/"
          cp scripts/unhosted.desktop  "$STAGE/"
          cp scripts/unhosted.service  "$STAGE/"
          cp branding/logo/app-icon.svg "$STAGE/unhosted.svg"
          cp LICENSE README.md CHANGELOG.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Stage release artifact (macos)
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          STAGE="unhosted-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/unhosted          "$STAGE/"
          cp target/${{ matrix.target }}/release/unhosted-desktop  "$STAGE/"
          cp LICENSE README.md CHANGELOG.md "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

          # Also produce the .app bundle as a separate asset.
          UNHOSTED_BIN="$PWD/target/${{ matrix.target }}/release/unhosted-desktop" \
            bash scripts/bundle-macos.sh
          APP_ARCHIVE="unhosted-macos-app-${{ matrix.target }}.tar.gz"
          tar -czf "$APP_ARCHIVE" -C dist unhosted.app
          shasum -a 256 "$APP_ARCHIVE" > "${APP_ARCHIVE}.sha256"

      - name: Stage release artifact (windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          $stage = "unhosted-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/unhosted.exe"         "$stage/"
          Copy-Item "target/${{ matrix.target }}/release/unhosted-desktop.exe" "$stage/"
          Copy-Item LICENSE,README.md,CHANGELOG.md "$stage/"
          Compress-Archive -Path $stage -DestinationPath "$stage.zip" -Force
          (Get-FileHash -Algorithm SHA256 "$stage.zip").Hash + "  $stage.zip" | Set-Content "$stage.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: unhosted-${{ matrix.target }}
          path: |
            unhosted-${{ matrix.target }}.${{ matrix.archive }}
            unhosted-${{ matrix.target }}.${{ matrix.archive }}.sha256
            unhosted-macos-app-${{ matrix.target }}.tar.gz
            unhosted-macos-app-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See CHANGELOG.md for what's in this release." \
            --draft=false \
            dist/*
