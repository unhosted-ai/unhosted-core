name: Docker

on:
  # Tag-only. Every push to main was previously triggering a fresh
  # multi-arch image build whose only meaningful output was an extra
  # notification — the image only needs rebuilding when a version
  # ships. Aligns this workflow's cadence with release.yml.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/unhosted

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=unhosted
            org.opencontainers.image.description=AI that lives where you do — open-source software that pools the computers you already own into a single inference cluster.
            org.opencontainers.image.vendor=unhosted-ai
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
          annotations: |
            org.opencontainers.image.title=unhosted
            org.opencontainers.image.description=AI that lives where you do — open-source software that pools the computers you already own into a single inference cluster.
            org.opencontainers.image.vendor=unhosted-ai
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
