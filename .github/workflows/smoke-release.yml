name: Smoke-test release

# Runs after a release is published, or manually for any existing tag.
# Downloads the per-OS artifact from the release, runs `--version` and
# `doctor`, then briefly starts the daemon and hits /health + /v1/run
# to confirm the structured upstream-offline response is in place.
#
# The point: you don't own a Linux box or a Windows machine. Without
# this, "did the release actually work on every OS?" is unanswerable
# until a user files a bug. With this, the answer is a green/red
# checkmark on the Actions page minutes after every tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to smoke-test (e.g. v0.0.5)"
        required: true

permissions:
  contents: read

jobs:
  smoke:
    name: smoke / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            os: macos-latest
            asset: unhosted-aarch64-apple-darwin.tar.gz
            archive: tar
            bin: unhosted-aarch64-apple-darwin/unhosted
          - label: linux-x86_64
            os: ubuntu-latest
            asset: unhosted-x86_64-unknown-linux-gnu.tar.gz
            archive: tar
            bin: unhosted-x86_64-unknown-linux-gnu/unhosted
          - label: linux-aarch64
            os: ubuntu-24.04-arm
            asset: unhosted-aarch64-unknown-linux-gnu.tar.gz
            archive: tar
            bin: unhosted-aarch64-unknown-linux-gnu/unhosted
          - label: windows-x86_64
            os: windows-latest
            asset: unhosted-x86_64-pc-windows-msvc.zip
            archive: zip
            bin: unhosted-x86_64-pc-windows-msvc/unhosted.exe

    steps:
      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      # -------- macOS / Linux: bash + curl + tar --------
      - name: Download + smoke test (unix)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -e
          TAG="${{ steps.resolve.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${{ matrix.asset }}"
          echo "→ fetching $URL"
          curl -fsSL -o asset.tar.gz "$URL"
          tar -xzf asset.tar.gz

          BIN="${{ matrix.bin }}"
          echo
          echo "→ ${BIN} --version"
          "./${BIN}" --version

          echo
          echo "→ ${BIN} doctor"
          "./${BIN}" doctor

          echo
          echo "→ start daemon for 4 seconds, then probe /health + /v1/run"
          "./${BIN}" serve > daemon.log 2>&1 &
          DAEMON=$!
          sleep 3

          echo "  /health:"
          curl -sS -o /dev/null -w "    HTTP %{http_code}\n" http://127.0.0.1:7777/health
          [ "$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:7777/health)" = "200" ] || { echo "FAIL: /health not 200"; exit 1; }

          echo "  /v1/run (no runtime — expect HTTP 503 + structured JSON):"
          HTTP=$(curl -sS -o body.json -w "%{http_code}" -X POST http://127.0.0.1:7777/v1/run \
            -H "content-type: application/json" \
            -d '{"prompt":"hi","max_tokens":4}')
          echo "    HTTP $HTTP"
          cat body.json
          echo
          [ "$HTTP" = "503" ] || { echo "FAIL: /v1/run not 503"; exit 1; }
          grep -q '"upstream_offline"' body.json || { echo "FAIL: structured error missing"; exit 1; }

          kill $DAEMON 2>/dev/null || true
          echo
          echo "✓ ${{ matrix.label }} smoke OK"

      # -------- Windows: PowerShell + Invoke-WebRequest + Expand-Archive --------
      - name: Download + smoke test (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $TAG = "${{ steps.resolve.outputs.tag }}"
          $URL = "https://github.com/${{ github.repository }}/releases/download/$TAG/${{ matrix.asset }}"
          Write-Host "→ fetching $URL"
          Invoke-WebRequest -Uri $URL -OutFile asset.zip
          Expand-Archive asset.zip -DestinationPath .

          $BIN = "${{ matrix.bin }}"
          Write-Host
          Write-Host "→ $BIN --version"
          & ".\$BIN" --version
          if ($LASTEXITCODE -ne 0) { throw "--version exited $LASTEXITCODE" }

          Write-Host
          Write-Host "→ $BIN doctor"
          & ".\$BIN" doctor
          if ($LASTEXITCODE -ne 0) { throw "doctor exited $LASTEXITCODE" }

          Write-Host
          Write-Host "→ start daemon, probe /health + /v1/run"
          $proc = Start-Process -FilePath ".\$BIN" -ArgumentList "serve","--addr","127.0.0.1:7777" -PassThru -NoNewWindow -RedirectStandardOutput daemon.log -RedirectStandardError daemon.err.log

          # Windows Defender's first-run scan can delay startup well past
          # the 4 seconds we used to wait. Poll /health up to 30 s, then
          # dump the daemon logs if we still can't reach it — that gives
          # a real diagnostic instead of bare "connection refused".
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            try {
              $h = Invoke-WebRequest -Uri "http://127.0.0.1:7777/health" -UseBasicParsing -TimeoutSec 2
              if ($h.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
          }
          if (-not $ready) {
            Write-Host "FAIL: daemon never accepted /health within 30s"
            Write-Host "--- daemon.log ---"
            if (Test-Path daemon.log) { Get-Content daemon.log } else { Write-Host "(empty)" }
            Write-Host "--- daemon.err.log ---"
            if (Test-Path daemon.err.log) { Get-Content daemon.err.log } else { Write-Host "(empty)" }
            throw "/health never returned 200"
          }
          Write-Host "  /health: HTTP 200 (after $i s)"

          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:7777/v1/run" -Method POST -Body '{"prompt":"hi","max_tokens":4}' -ContentType "application/json" -UseBasicParsing
            $http = $r.StatusCode
            $body = $r.Content
          } catch {
            # Invoke-WebRequest throws on >=400 by default; capture the response.
            $http = $_.Exception.Response.StatusCode.value__
            $reader = New-Object IO.StreamReader $_.Exception.Response.GetResponseStream()
            $body = $reader.ReadToEnd()
          }
          Write-Host "  /v1/run: HTTP $http"
          Write-Host "  body: $body"
          if ($http -ne 503) { throw "/v1/run not 503" }
          if ($body -notmatch "upstream_offline") { throw "structured error missing" }

          Stop-Process -Id $proc.Id -Force
          Write-Host
          Write-Host "✓ ${{ matrix.label }} smoke OK"
